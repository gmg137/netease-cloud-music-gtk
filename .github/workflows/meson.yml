
name: Build on multi platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v7

    - name: Build application
      id: build
      uses: ./.github/actions/build

    - name: Bundle AppImage
      if: runner.os == 'Linux'
      uses: ./.github/actions/appimage
      with:
        build-dir: ${{ steps.build.outputs.build-dir }}
        appdir: ${{ steps.build.outputs.appdir }}

    - name: Upload artifacts
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v7
      with:
        name: netease-cloud-music_${{ github.run_id }}
        path: ${{ steps.build.outputs.build-dir }}/target/release/bundle
