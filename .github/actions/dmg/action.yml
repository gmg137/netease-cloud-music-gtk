name: Bundle macOS DMG
description: Bundle the application as a macOS DMG

inputs:
  build-dir:
    description: Meson build directory
    required: true
  version:
    description: Version string embedded in the DMG file name
    required: false
    default: ''

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        brew install dylibbundler

        BUNDLE_DIR="${{ inputs.build-dir }}/target/release/bundle/osx"
        cd "$BUNDLE_DIR/netease-cloud-music-gtk4.app/Contents"
        dylibbundler -od -b -x MacOS/netease-cloud-music-gtk4 -d Libraries -p @executable_path/../Libraries
        cd "$BUNDLE_DIR"

        # Tag the DMG with the build architecture so the arm64 and x86_64
        # builds do not collide when uploaded as release assets of the same name.
        ARCH_TAG=$(uname -m)
        case "$ARCH_TAG" in
          arm64)  ARCH_TAG="arm64" ;;
          x86_64) ARCH_TAG="x86_64" ;;
        esac

        VERSION="${{ inputs.version }}"
        if [ -n "$VERSION" ]; then
          DMG_NAME="netease-cloud-music-gtk4-${VERSION}-${ARCH_TAG}.dmg"
        else
          DMG_NAME="netease-cloud-music-gtk4-${ARCH_TAG}.dmg"
        fi

        hdiutil create -volname "NeteaseCloudMusicGtk4" \
          -srcfolder netease-cloud-music-gtk4.app \
          -ov -format UDZO \
          "${{ inputs.build-dir }}/target/release/bundle/${DMG_NAME}"

        # Remove the generic dmg that cargo-bundle generated automatically,
        # as well as any stale ones left over from a previous cached build,
        # so that only our versioned product survives in the bundle directory.
        rm -f "${{ inputs.build-dir }}/target/release/bundle/dmg/netease-cloud-music-gtk4.dmg" \
              "${{ inputs.build-dir }}/target/release/bundle/netease-cloud-music-gtk4.dmg" \
              "${{ inputs.build-dir }}/target/release/bundle/netease-cloud-music-gtk4-arm64.dmg" \
              "${{ inputs.build-dir }}/target/release/bundle/netease-cloud-music-gtk4-x86_64.dmg"
